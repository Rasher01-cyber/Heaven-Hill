<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>HEAVEN HILLS · 5-Star Himalayan Luxury Resort · ROYAL ADMIN</title>
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* ===== GLOBAL DESIGN SYSTEM ===== (unchanged, only additions) */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #0a2e3f;
            --primary-light: #1a4a5f;
            --primary-dark: #051f2a;
            --secondary: #c9a959;
            --secondary-light: #e6d5a8;
            --secondary-dark: #b38f4a;
            --accent: #8a6e4b;
            --light: #faf7f2;
            --light-gray: #f1f5f9;
            --dark: #1e2e3b;
            --success: #2e7d5e;
            --danger: #b4433c;
            --warning: #e6b422;
            --info: #3a7ca5;
            --gray: #8a9a9b;
            --gray-light: #e9ecef;
            --shadow-sm: 0 5px 20px rgba(0,0,0,0.05);
            --shadow-md: 0 15px 35px rgba(0,0,0,0.1);
            --shadow-lg: 0 25px 50px rgba(0,0,0,0.15);
            --border-radius-sm: 8px;
            --border-radius-md: 16px;
            --border-radius-lg: 24px;
            --border-radius-xl: 32px;
            --transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            
            /* Royal admin theme additions */
            --royal-gold: #d4af37;
            --royal-gold-light: #f1e5c9;
            --royal-burgundy: #5e2e4a;
            --royal-navy: #0a2e3f;
            --royal-cream: #fffaf0;
            --royal-pattern: rgba(201,169,89,0.03);
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: var(--light);
            color: var(--dark);
            line-height: 1.7;
            overflow-x: hidden;
            transition: background 0.6s ease, color 0.4s ease;
        }

        h1, h2, h3, h4, h5, h6 {
            font-family: 'Cormorant Garamond', serif;
            font-weight: 700;
            letter-spacing: 1px;
        }

        /* ===== CUSTOM SCROLLBAR ===== */
        ::-webkit-scrollbar { width: 12px; height: 12px; }
        ::-webkit-scrollbar-track { background: var(--light-gray); border-radius: 6px; }
        ::-webkit-scrollbar-thumb { background: var(--secondary); border-radius: 6px; border: 3px solid var(--light-gray); }
        ::-webkit-scrollbar-thumb:hover { background: var(--secondary-dark); }

        html { scroll-behavior: smooth; }

        /* ===== NAVIGATION ===== (unchanged) */
        .navbar {
            position: fixed;
            top: 25px;
            left: 50%;
            transform: translateX(-50%);
            width: 95%;
            max-width: 1600px;
            background: rgba(10, 46, 63, 0.95);
            backdrop-filter: blur(12px);
            padding: 1rem 2.5rem;
            border-radius: 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            border: 1px solid rgba(201,169,89,0.3);
            box-shadow: var(--shadow-lg);
            transition: var(--transition);
        }

        .navbar.scrolled { top: 15px; background: var(--primary); padding: 0.8rem 2.5rem; }

        .logo {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #c9a959, #e6d5a8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 6px;
            position: relative;
            white-space: nowrap;
            display: inline-block;
            line-height: 1;
        }

        .logo::after {
            content: '✦';
            position: absolute;
            right: -18px;
            top: 7px;
            color: var(--secondary);
            font-size: 1.1rem;
            -webkit-text-fill-color: var(--secondary);
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            list-style: none;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            font-size: 0.78rem;
            font-weight: 600;
            letter-spacing: 2.2px;
            text-transform: uppercase;
            transition: color 0.3s ease;
            position: relative;
            text-shadow: 0 1px 6px rgba(0,0,0,0.35);
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--secondary);
            transition: width 0.3s ease;
        }

        .nav-links a:hover::after,
        .nav-links a.active::after { width: 100%; }
        .nav-links a:hover,
        .nav-links a.active { color: var(--secondary); }

        .nav-buttons { display: flex; gap: 1rem; }
        .menu-toggle {
            display: none;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            border: 1px solid rgba(201,169,89,0.5);
            background: rgba(255,255,255,0.06);
            color: var(--secondary);
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: var(--transition);
        }
        .menu-toggle:hover {
            background: rgba(201,169,89,0.22);
            color: #fff;
        }
        .mobile-menu-overlay {
            position: fixed;
            inset: 0;
            background: rgba(5,31,42,0.72);
            backdrop-filter: blur(3px);
            z-index: 1200;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .mobile-menu-overlay.open {
            opacity: 1;
            pointer-events: auto;
        }
        .mobile-menu-drawer {
            position: absolute;
            top: 0;
            right: 0;
            width: min(88vw, 360px);
            height: 100%;
            background: linear-gradient(165deg, #0a2e3f, #051f2a);
            border-left: 1px solid rgba(201,169,89,0.35);
            box-shadow: -10px 0 30px rgba(0,0,0,0.35);
            transform: translateX(100%);
            transition: transform 0.35s ease;
            display: flex;
            flex-direction: column;
            padding: 1.4rem 1.2rem;
        }
        .mobile-menu-overlay.open .mobile-menu-drawer { transform: translateX(0); }
        .mobile-menu-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1rem;
            color: var(--secondary);
        }
        .mobile-menu-list {
            list-style: none;
            display: grid;
            gap: 0.6rem;
            margin-top: 0.4rem;
        }
        .mobile-menu-link {
            width: 100%;
            border: 1px solid rgba(201,169,89,0.25);
            background: rgba(255,255,255,0.04);
            color: white;
            border-radius: 14px;
            text-align: left;
            padding: 0.85rem 1rem;
            font-size: 0.86rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            transition: var(--transition);
        }
        .mobile-menu-link:hover {
            background: rgba(201,169,89,0.24);
            border-color: var(--secondary);
        }
        .mobile-menu-link.active {
            border-color: var(--secondary);
            color: var(--secondary);
        }

        /* ===== BUTTONS ===== (unchanged) */
        .btn {
            padding: 0.8rem 2rem;
            border: none;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            cursor: pointer;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 0.8rem;
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .btn:hover::before { width: 300px; height: 300px; }

        .btn-primary {
            background: var(--secondary);
            color: var(--primary);
            border: 2px solid var(--secondary);
        }

        .btn-primary:hover {
            background: transparent;
            color: var(--secondary);
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(201,169,89,0.3);
        }

        .btn-outline {
            background: transparent;
            color: white;
            border: 2px solid var(--secondary);
        }

        .btn-outline:hover {
            background: var(--secondary);
            color: var(--primary);
            transform: translateY(-3px);
        }

        /* ===== HERO SECTION ===== (unchanged) */
        .hero {
            min-height: 100vh;
            height: auto;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: white;
            overflow: visible;
            padding-bottom: 2.5rem;
        }

        .hero-slider {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .hero-slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            opacity: 0;
            transition: opacity 1.8s ease;
        }

        .hero-slide.active { opacity: 1; }
        .hero-slide::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, rgba(5,24,34,0.55), rgba(8,31,42,0.88));
        }

        .hero-content {
            position: relative;
            z-index: 10;
            max-width: 1200px;
            padding: 0 2rem;
            padding-top: 7rem;
            animation: fadeInUp 1.5s ease;
            background: linear-gradient(180deg, rgba(7,28,39,0.58), rgba(7,28,39,0.22));
            border: 1px solid rgba(201,169,89,0.28);
            border-radius: 22px;
            backdrop-filter: blur(4px);
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .hero-title {
            font-size: 6rem;
            font-weight: 700;
            color: white;
            margin-bottom: 1rem;
            text-shadow: 0 18px 40px rgba(0,0,0,0.55);
            letter-spacing: 12px;
        }

        .hero-title span { 
            color: var(--secondary);
            text-shadow: 0 0 20px rgba(201,169,89,0.5);
        }

        .hero-subtitle {
            font-size: 1.3rem;
            letter-spacing: 8px;
            margin-bottom: 3rem;
            color: rgba(255,255,255,0.95);
            font-weight: 300;
        }

        /* ===== SEARCH PANEL ===== (unchanged) */
        .search-panel {
            margin-top: 3.5rem;
            padding: 1.5rem;
            background: rgba(8,31,42,0.42);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(201,169,89,0.55);
            border-radius: 70px;
            display: grid;
            grid-template-columns: 1.5fr repeat(4, minmax(120px, 1fr)) minmax(150px, 0.9fr);
            gap: 0.8rem;
            align-items: center;
        }

        .search-field {
            display: flex;
            flex-direction: column;
            text-align: left;
            padding: 0.3rem 1.2rem;
            border-radius: 50px;
            transition: background 0.3s ease;
            position: relative;
        }

        .search-field:hover { background: rgba(255,255,255,0.05); }

        .search-label {
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--secondary);
            margin-bottom: 0.2rem;
            font-weight: 600;
        }

        .search-input {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            font-size: 0.9rem;
            padding: 0.45rem 0.6rem;
            font-family: 'Montserrat', sans-serif;
            border-radius: 10px;
        }
        .search-input[type="date"] {
            font-size: 0.82rem;
            letter-spacing: 0.2px;
            padding-right: 0.35rem;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--secondary);
            box-shadow: 0 0 0 3px rgba(201,169,89,0.2);
        }
        .search-input::placeholder { color: rgba(255,255,255,0.6); }
        .search-input option { background: var(--primary); color: white; }
        .search-panel .btn {
            min-width: 140px;
            justify-content: center;
            white-space: nowrap;
        }
        .destination-suggestions {
            position: absolute;
            top: calc(100% + 8px);
            left: 0;
            right: 0;
            background: rgba(8,31,42,0.96);
            border: 1px solid rgba(201,169,89,0.4);
            border-radius: 14px;
            box-shadow: var(--shadow-lg);
            z-index: 30;
            max-height: 260px;
            overflow-y: auto;
            backdrop-filter: blur(10px);
        }
        .destination-option {
            width: 100%;
            text-align: left;
            background: transparent;
            border: none;
            color: white;
            padding: 0.7rem 0.9rem;
            font-size: 0.82rem;
            cursor: pointer;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }
        .destination-option:last-child { border-bottom: none; }
        .destination-option:hover,
        .destination-option.active {
            background: rgba(201,169,89,0.22);
            color: #fff7dc;
        }
        .nearby-preview {
            margin-top: 1rem;
            background: rgba(4,22,34,0.86);
            border: 1px solid rgba(201,169,89,0.62);
            border-radius: 16px;
            padding: 1rem;
            text-align: left;
            backdrop-filter: blur(8px);
        }
        .nearby-title {
            display: flex;
            align-items: center;
            gap: 0.45rem;
            font-size: 0.78rem;
            letter-spacing: 1.2px;
            text-transform: uppercase;
            color: #ffe8ad;
            margin-bottom: 0.55rem;
            font-weight: 700;
        }
        .nearby-tabs {
            display: inline-flex;
            gap: 0.35rem;
            margin-bottom: 0.6rem;
            padding: 0.2rem;
            border-radius: 999px;
            background: rgba(255,255,255,0.14);
            border: 1px solid rgba(201,169,89,0.25);
        }
        .nearby-tab {
            border: none;
            border-radius: 999px;
            background: transparent;
            color: rgba(255,255,255,0.96);
            padding: 0.42rem 0.82rem;
            font-size: 0.76rem;
            letter-spacing: 0.8px;
            text-transform: uppercase;
            cursor: pointer;
            font-weight: 700;
            border: 1px solid transparent;
        }
        .nearby-tab.active {
            background: rgba(201,169,89,0.3);
            color: #fff8de;
            border-color: rgba(255,248,222,0.5);
            box-shadow: 0 0 0 1px rgba(201,169,89,0.35) inset;
        }
        .nearby-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 0.55rem;
        }
        .nearby-scroll-area {
            max-height: 260px;
            overflow-y: auto;
            padding-right: 0.25rem;
        }
        .nearby-pill {
            border: 1px solid rgba(255,255,255,0.28);
            background: rgba(255,255,255,0.16);
            color: #fff;
            border-radius: 10px;
            padding: 0.58rem 0.72rem;
            font-size: 0.8rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            cursor: pointer;
            transition: var(--transition);
            text-align: left;
            width: 100%;
        }
        .nearby-pill:hover {
            border-color: rgba(201,169,89,0.65);
            background: rgba(201,169,89,0.2);
        }
        .nearby-pill.selected {
            border-color: var(--secondary);
            background: rgba(201,169,89,0.32);
            color: #fff7dc;
        }
        .nearby-service-item {
            border: 1px solid rgba(255,255,255,0.28);
            background: rgba(255,255,255,0.16);
            color: #fff;
            border-radius: 10px;
            padding: 0.6rem 0.7rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.6rem;
        }
        .service-label {
            flex: 1;
            min-width: 0;
            font-size: 0.8rem;
            white-space: normal;
            overflow: visible;
            text-overflow: unset;
            line-height: 1.35;
        }
        .service-price {
            font-size: 0.76rem;
            color: #f6e7bb;
            margin-left: 0.25rem;
            font-weight: 700;
        }
        .service-qty-controls {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            background: rgba(0,0,0,0.22);
            border: 1px solid rgba(201,169,89,0.55);
            border-radius: 999px;
            padding: 0.18rem 0.2rem;
        }
        .service-qty-btn {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: none;
            background: rgba(201,169,89,0.35);
            color: #fff;
            cursor: pointer;
            line-height: 1;
            font-weight: 700;
            font-size: 0.9rem;
        }
        .service-qty-value {
            min-width: 22px;
            text-align: center;
            font-size: 0.8rem;
            font-weight: 700;
        }
        .nearby-actions {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.5rem;
            margin-top: 0.6rem;
            flex-wrap: wrap;
            font-size: 0.72rem;
            color: rgba(255,255,255,0.85);
        }

        /* ===== SECTION STYLES ===== */
        .section {
            padding: 6rem 5rem;
            max-width: 1800px;
            margin: 0 auto;
        }

        .section-header {
            text-align: center;
            margin-bottom: 4rem;
        }

        .section-tag {
            display: inline-block;
            padding: 0.4rem 1.8rem;
            background: rgba(201,169,89,0.1);
            color: var(--secondary);
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 1rem;
            border: 1px solid rgba(201,169,89,0.3);
        }

        .section-title {
            font-size: 3.5rem;
            color: var(--primary);
            margin-bottom: 1rem;
            position: relative;
            display: inline-block;
        }

        .section-title::after {
            content: '';
            position: absolute;
            bottom: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 3px;
            background: linear-gradient(90deg, var(--secondary), #e6d5a8);
            border-radius: 3px;
        }

        /* ===== ROOM CARDS - MAKEMYTRIP STYLE ===== */
        .rooms-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(450px, 1fr));
            gap: 2.5rem;
            margin-top: 3rem;
        }

        .room-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: var(--shadow-md);
            transition: var(--transition);
            border: 1px solid rgba(201,169,89,0.1);
            display: flex;
            flex-direction: column;
        }

        .room-card:hover {
            transform: translateY(-8px);
            box-shadow: var(--shadow-lg);
            border-color: var(--secondary);
        }

        .room-image-wrapper {
            position: relative;
            height: 280px;
            overflow: hidden;
        }

        .room-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.8s ease;
        }

        .room-card:hover .room-image {
            transform: scale(1.08);
        }

        .room-badge {
            position: absolute;
            top: 20px;
            left: 20px;
            background: var(--secondary);
            color: var(--primary);
            padding: 0.5rem 1.2rem;
            border-radius: 30px;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 1px;
            z-index: 5;
            box-shadow: 0 5px 15px rgba(201,169,89,0.3);
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }

        .room-gallery {
            position: absolute;
            bottom: 20px;
            right: 20px;
            display: flex;
            gap: 0.5rem;
            z-index: 5;
        }

        .gallery-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: rgba(255,255,255,0.5);
            cursor: pointer;
            transition: var(--transition);
        }

        .gallery-dot.active {
            background: var(--secondary);
            transform: scale(1.2);
        }

        .room-content {
            padding: 1.8rem;
            flex: 1;
        }

        .room-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 0.8rem;
        }

        .room-name {
            font-size: 1.6rem;
            color: var(--primary);
            margin-bottom: 0.2rem;
        }

        .room-location {
            display: flex;
            align-items: center;
            gap: 0.3rem;
            color: var(--gray);
            font-size: 0.85rem;
            margin-bottom: 0.5rem;
        }

        .room-location i {
            color: var(--secondary);
            font-size: 0.75rem;
        }

        .room-rating {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: rgba(201,169,89,0.1);
            padding: 0.3rem 1rem;
            border-radius: 30px;
        }

        .rating-score {
            background: var(--secondary);
            color: var(--primary);
            font-weight: 700;
            padding: 0.2rem 0.5rem;
            border-radius: 20px;
            font-size: 0.8rem;
        }

        .room-amenities {
            display: flex;
            flex-wrap: wrap;
            gap: 0.6rem;
            margin: 1rem 0;
        }

        .amenity-tag {
            padding: 0.3rem 1rem;
            background: var(--light);
            border-radius: 30px;
            font-size: 0.75rem;
            color: var(--dark);
            border: 1px solid rgba(201,169,89,0.2);
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }

        .room-price-section {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-top: 1.2rem;
            padding-top: 1.2rem;
            border-top: 1px solid #edf2f7;
        }

        .room-price {
            display: flex;
            flex-direction: column;
        }

        .price-label {

            border-radius: 20px;
            padding: 2.5rem;

        .experience-title {

        }

        .experience-description {

            margin-bottom: 1rem;

        .experience-price {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--secondary);

        .experience-price span {

            font-weight: 400;
            color: var(--gray);

            gap: 1rem;
            flex-wrap: wrap;
            justify-content: space-between;

            padding: 1.5rem 2rem;
            border-radius: 60px;
            margin-bottom: 2rem;
            box-shadow: var(--shadow-sm);
        }
        .filter-group {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            flex-wrap: wrap;
        }
        .filter-select {
            padding: 0.6rem 1.2rem;
            border-radius: 40px;

        }

        }
        .ai-assistant {

        .assistant-msg.bot {

            display: flex;

        }
        .assistant-input {

            border: 1px solid rgba(201,169,89,0.35);
            background: rgba(255,255,255,0.1);

            font-size: 0.78rem;

            color: rgba(255,255,255,0.65);
        }
        .assistant-send {
            border: 1px solid rgba(201,169,89,0.45);
            border-radius: 10px;
            background: rgba(201,169,89,0.25);
            color: white;
            padding: 0.5rem 0.7rem;
            cursor: pointer;
        }
        .assistant-suggestions {
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem;
            margin-top: 0.2rem;
        }
        .assistant-suggestion {
            border: 1px solid rgba(201,169,89,0.4);
            background: rgba(255,255,255,0.07);
            color: white;
            border-radius: 999px;
            padding: 0.35rem 0.65rem;
            font-size: 0.7rem;
            cursor: pointer;
            transition: var(--transition);
        }
        .assistant-suggestion:hover {
            background: rgba(201,169,89,0.24);
            transform: translateY(-1px);
        }
        .assistant-chip {
            border: 1px solid rgba(201,169,89,0.45);
            background: rgba(255,255,255,0.08);
            color: white;
            border-radius: 14px;
            padding: 0.6rem 0.8rem;
            text-align: left;
            cursor: pointer;
            transition: var(--transition);
            font-size: 0.82rem;
        }
        .assistant-chip:hover {
            background: rgba(201,169,89,0.28);
            transform: translateY(-1px);
        }
        .assistant-mini {
            font-size: 0.72rem;
            opacity: 0.85;
        }

        /* ===== GUEST DASHBOARD ===== */
        .guest-dashboard {
            padding: 2rem;
            background: white;
            border-radius: 24px;
            margin-bottom: 2rem;
        }
        .booking-history-card {
            background: var(--light);
            padding: 1.5rem;
            border-radius: 16px;
            margin-bottom: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }

        /* ===== ADMIN CHART ===== */
        .chart-container {
            display: flex;
            align-items: flex-end;
            gap: 1.5rem;
            margin-top: 1.5rem;
            height: 200px;
        }
        .chart-bar {
            width: 60px;
            background: linear-gradient(to top, var(--secondary), #e6d5a8);
            border-radius: 12px 12px 0 0;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            text-align: center;
            color: var(--primary);
            font-weight: 700;
            padding-top: 0.5rem;
            box-shadow: 0 -2px 10px rgba(201,169,89,0.2);
            transition: height 0.3s ease;
        }

        /* ===== AUTH MODAL ===== (unchanged) */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10,46,63,0.98);
            backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            opacity: 0;
            visibility: hidden;
            transition: var(--transition);
        }

        .modal.active {
            opacity: 1;
            visibility: visible;
        }

        .modal-content {
            background: white;
            padding: 3.5rem;
            border-radius: 40px;
            max-width: 520px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
            transform: scale(0.9) translateY(20px);
            transition: var(--transition);
            border: 2px solid var(--secondary);
        }

        .modal.active .modal-content {
            transform: scale(1) translateY(0);
        }

        .modal-close {
            position: absolute;
            top: 1.5rem;
            right: 1.5rem;
            background: none;
            border: none;
            font-size: 2rem;
            cursor: pointer;
            color: var(--gray);
            transition: var(--transition);
        }

        .modal-close:hover {
            color: var(--danger);
            transform: rotate(90deg);
        }

        .modal-tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            padding: 0.5rem;
            background: #f1f5f9;
            border-radius: 60px;
        }

        .modal-tab {
            flex: 1;
            padding: 0.8rem;
            border: none;
            border-radius: 60px;
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            transition: var(--transition);
            background: transparent;
            color: var(--primary);
        }

        .modal-tab.active {
            background: var(--secondary);
            color: var(--primary);
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--secondary);
            margin-bottom: 0.5rem;
        }

        .form-control {
            width: 100%;
            padding: 0.9rem 1.2rem;
            border: 2px solid #e2e8f0;
            border-radius: 16px;
            font-family: 'Montserrat', sans-serif;
            transition: var(--transition);
        }

        .form-control:focus {
            outline: none;
            border-color: var(--secondary);
            box-shadow: 0 0 0 4px rgba(201,169,89,0.1);
        }

        /* ===== FOOTER ===== (unchanged) */
        .footer {
            background: var(--primary);
            color: white;
            padding: 5rem 5rem 2rem;
            margin-top: 5rem;
            position: relative;
        }

        .footer::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, var(--secondary), transparent);
        }

        .footer-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 3rem;
            max-width: 1600px;
            margin: 0 auto;
        }

        .footer-title {
            color: var(--secondary);
            font-size: 1.3rem;
            margin-bottom: 1.5rem;
            position: relative;
            display: inline-block;
        }

        .footer-title::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 0;
            width: 40px;
            height: 2px;
            background: var(--secondary);
        }

        .footer-links {
            list-style: none;
        }

        .footer-links li {
            margin-bottom: 0.8rem;
        }

        .footer-links a {
            color: rgba(255,255,255,0.7);
            text-decoration: none;
            transition: var(--transition);
            display: inline-block;
        }

        .footer-links a:hover {
            color: var(--secondary);
            transform: translateX(5px);
        }

        .social-links {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
        }

        .social-link {
            width: 45px;
            height: 45px;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-decoration: none;
            transition: var(--transition);
            border: 1px solid rgba(201,169,89,0.3);
        }

        .social-link:hover {
            background: var(--secondary);
            color: var(--primary);
            transform: translateY(-5px);
        }

        /* ===== NOTIFICATION ===== */
        .notification {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: white;
            color: var(--dark);
            padding: 1.2rem 2rem;
            border-radius: 60px;
            box-shadow: var(--shadow-lg);
            display: flex;
            align-items: center;
            gap: 1rem;
            z-index: 99999;
            transform: translateX(100px);
            opacity: 0;
            transition: var(--transition);
            border-left: 5px solid var(--secondary);
            font-weight: 500;
        }

        .notification.show {
            transform: translateX(0);
            opacity: 1;
        }

        .notification i {
            font-size: 1.2rem;
            color: var(--secondary);
        }

        /* ===== FUTURISTIC UX ENHANCEMENTS ===== */
        body.theme-future {
            background:
                radial-gradient(circle at 10% 20%, rgba(58,124,165,0.08), transparent 35%),
                radial-gradient(circle at 80% 10%, rgba(201,169,89,0.12), transparent 30%),
                linear-gradient(180deg, #f7fbff 0%, #f4f7fb 45%, #f8f5ef 100%);
        }
        body.theme-dark {
            background: linear-gradient(180deg, #041722 0%, #0a2534 45%, #0e2f41 100%);
            color: #e8eff4;
        }
        body.theme-dark .section { color: #e8eff4; }
        body.theme-dark .room-card,
        body.theme-dark .filter-bar,
        body.theme-dark .experience-card,
        body.theme-dark .review-card,
        body.theme-dark .guest-dashboard,
        body.theme-dark .booking-history-card {
            background: rgba(8,31,42,0.92);
            color: #e8eff4;
            border-color: rgba(201,169,89,0.25);
        }
        body.theme-dark .section-title,
        body.theme-dark .room-name,
        body.theme-dark .experience-title,
        body.theme-dark .card-title {
            color: #f6e7bb;
        }
        body.theme-dark .filter-input,
        body.theme-dark .filter-select,
        body.theme-dark .form-control {
            background: rgba(255,255,255,0.06);
            color: #fff;
            border-color: rgba(201,169,89,0.35);
        }
        body.theme-dark .filter-input::placeholder { color: rgba(255,255,255,0.6); }
        .theme-transition {
            position: fixed;
            inset: 0;
            z-index: 20000;
            pointer-events: none;
            opacity: 0;
            background: radial-gradient(circle at 20% 20%, rgba(201,169,89,0.35), transparent 40%),
                        radial-gradient(circle at 80% 80%, rgba(58,124,165,0.35), transparent 40%),
                        linear-gradient(135deg, rgba(8,31,42,0.65), rgba(248,245,239,0.35));
        }
        .theme-transition.play { animation: vacationWipe 900ms ease both; }
        @keyframes vacationWipe {
            0% { opacity: 0; transform: scale(1.04); filter: blur(0px); }
            25% { opacity: 0.55; }
            100% { opacity: 0; transform: scale(1); filter: blur(2px); }
        }
        .theme-toggle {
            border-color: rgba(201,169,89,0.5);
            box-shadow: 0 8px 20px rgba(10,46,63,0.2);
        }
        .quick-presets {
            margin-top: 1.2rem;
            display: flex;
            justify-content: center;
            gap: 0.7rem;
            flex-wrap: wrap;
        }
        .trust-bar {
            margin-top: 1rem;
            display: flex;
            justify-content: center;
            gap: 0.7rem;
            flex-wrap: wrap;
        }
        .trust-pill {
            border: 1px solid rgba(201,169,89,0.45);
            background: rgba(10,46,63,0.38);
            color: #fff;
            padding: 0.45rem 0.85rem;
            border-radius: 999px;
            font-size: 0.68rem;
            letter-spacing: 0.7px;
            text-transform: uppercase;
        }
        .preset-chip {
            border: 1px solid rgba(255,255,255,0.45);
            background: rgba(255,255,255,0.12);
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 999px;
            font-size: 0.72rem;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            transition: var(--transition);
            backdrop-filter: blur(8px);
        }
        .preset-chip:hover {
            background: rgba(201,169,89,0.28);
            border-color: var(--secondary);
            transform: translateY(-2px);
        }
        .floating-dock {
            position: fixed;
            right: 22px;
            bottom: 22px;
            display: flex;
            flex-direction: column;
            gap: 0.7rem;
            z-index: 9999;
        }
        .dock-btn {
            width: 52px;
            height: 52px;
            border: none;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(145deg, rgba(10,46,63,0.95), rgba(26,74,95,0.95));
            color: var(--secondary);
            box-shadow: 0 12px 24px rgba(10,46,63,0.3);
            cursor: pointer;
            transition: var(--transition);
            border: 1px solid rgba(201,169,89,0.35);
        }
        .dock-btn:hover {
            transform: translateY(-3px) scale(1.04);
            color: #fff;
            background: linear-gradient(145deg, var(--secondary), #d7b86f);
        }
        .dock-btn.hidden {
            opacity: 0;
            transform: translateY(14px);
            pointer-events: none;
        }
        .reveal-ready {
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 0.7s ease, transform 0.7s ease;
        }
        .reveal-ready.is-visible {
            opacity: 1;
            transform: translateY(0);
        }
        body.reduce-motion *,
        body.reduce-motion *::before,
        body.reduce-motion *::after {
            animation: none !important;
            transition-duration: 0.01ms !important;
            scroll-behavior: auto !important;
        }
        @media (prefers-reduced-motion: reduce) {
            .hero-slide { transition: none; }
            .reveal-ready { opacity: 1; transform: none; }
        }

            useEffect(() => {
                try {

                    console.error('Auth error');

            const login = useCallback(async (email, password) => {
                await new Promise(resolve => setTimeout(resolve, 600));

                const users = Storage.getUsers();
                const user = users.find(u => u.email === email && u.password === password);
                
                if (user) {
                    const userData = {
                        id: user.id,
                        name: user.name,
                        email: user.email,
                        role: user.role,
                        avatar: user.avatar
                    };
                    localStorage.setItem('hh_current_user', JSON.stringify(userData));
                    setUser(userData);
                    return { success: true, user: userData };
                }

                const guests = Storage.getGuests();
                const guest = guests.find(g => g.email === email && g.password === password);
                
                if (guest) {
                    const userData = {
                        id: guest.id,
                        name: guest.name,
                        email: guest.email,
                        role: 'guest',
                        avatar: guest.avatar || 'https://randomuser.me/api/portraits/lego/1.jpg'
                    };
                    localStorage.setItem('hh_current_user', JSON.stringify(userData));
                    setUser(userData);
                    return { success: true, user: userData };
                }

                return { success: false, error: 'Invalid email or password' };
            }, []);

            const register = useCallback(async (userData) => {
                await new Promise(resolve => setTimeout(resolve, 600));

                if (!userData.name || !userData.email || !userData.phone || !userData.password) {
                    return { success: false, error: 'All fields are required' };
                }

                if (userData.password.length < 6) {
                    return { success: false, error: 'Password must be at least 6 characters' };
                }

                const users = Storage.getUsers();
                const guests = Storage.getGuests();
                
                if (users.find(u => u.email === userData.email) || guests.find(g => g.email === userData.email)) {
                    return { success: false, error: 'Email already registered' };
                }

                const newGuest = {
                    name: userData.name,
                    email: userData.email,
                    phone: userData.phone,
                    password: userData.password,
                    avatar: `https://randomuser.me/api/portraits/${Math.random() > 0.5 ? 'men' : 'women'}/${Math.floor(Math.random() * 50 + 1)}.jpg`,
                    bookings: 0,
                    totalSpent: 0
                };

                const savedGuest = Storage.addGuest(newGuest);
                
                const userDataResponse = {
                    id: savedGuest.id,
                    name: savedGuest.name,
                    email: savedGuest.email,
                    role: 'guest',
                    avatar: savedGuest.avatar
                };

                localStorage.setItem('hh_current_user', JSON.stringify(userDataResponse));
                setUser(userDataResponse);
                return { success: true, user: userDataResponse };
            }, []);

            const logout = useCallback(() => {
                localStorage.removeItem('hh_current_user');
                setUser(null);
            }, []);

            return { user, loading, login, register, logout };
        };

                                    <p style={{ color: 'var(--secondary)', marginBottom: '1.5rem', fontSize: '0.9rem', letterSpacing: '2px' }}>{selectedRoom.type}</p>

                                                <div style={{ opacity: 0.8, fontSize: '0.75rem', marginBottom: '0.3rem' }}>CHECK-IN</div>
                                                <input 
                                                    type="date" 
                                                    value={searchParams.checkIn}
                                                    min={today}
                                                    onChange={(e) => setSearchParams({...searchParams, checkIn: e.target.value})}
                                                    style={{ 
                                                        width: '100%', 
                                                        padding: '0.6rem', 
                                                        borderRadius: '8px', 
                                                        border: '1px solid var(--secondary)',
                                                        background: 'rgba(255,255,255,0.9)',
                                                        color: 'var(--primary)',
                                                        fontSize: '0.9rem'
                                                    }}
                                                />
                                            </div>
                                            <div>
                                                <div style={{ opacity: 0.8, fontSize: '0.75rem', marginBottom: '0.3rem' }}>CHECK-OUT</div>

                                                    type="date" 
                                                    value={searchParams.checkOut}
                                                    min={searchParams.checkIn || today}
                                                    onChange={(e) => setSearchParams({...searchParams, checkOut: e.target.value})}
                                                    style={{ 
                                                        width: '100%', 
                                                        padding: '0.6rem', 
                                                        borderRadius: '8px', 
                                                        border: '1px solid var(--secondary)',
                                                        background: 'rgba(255,255,255,0.9)',
                                                        color: 'var(--primary)',
                                                        fontSize: '0.9rem'
                                                    }}
                                                />
                                            </div>
                                        </div>
                                        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '1rem', marginTop: '1rem' }}>
                                            <div>
                                                <div style={{ opacity: 0.8, fontSize: '0.75rem', marginBottom: '0.3rem' }}>ADULTS</div>
                                                <select 
                                                    value={searchParams.adults}
                                                    onChange={(e) => setSearchParams({...searchParams, adults: e.target.value})}
                                                    style={{ 
                                                        width: '100%', 
                                                        padding: '0.6rem', 
                                                        borderRadius: '8px', 
                                                        border: '1px solid var(--secondary)',
                                                        background: 'rgba(255,255,255,0.9)',
                                                        color: 'var(--primary)'
                                                    }}
                                                >
                                                    <option value="1">1 Adult</option>
                                                    <option value="2">2 Adults</option>
                                                    <option value="3">3 Adults</option>
                                                    <option value="4">4 Adults</option>
                                                </select>
                                            </div>
                                            <div>
                                                <div style={{ opacity: 0.8, fontSize: '0.75rem', marginBottom: '0.3rem' }}>CHILDREN</div>
                                                <select 
                                                    value={searchParams.children}
                                                    onChange={(e) => setSearchParams({...searchParams, children: e.target.value})}
                                                    style={{ 
                                                        width: '100%', 
                                                        padding: '0.6rem', 
                                                        borderRadius: '8px', 
                                                        border: '1px solid var(--secondary)',
                                                        background: 'rgba(255,255,255,0.9)',
                                                        color: 'var(--primary)'
                                                    }}
                                                >
                                                    <option value="0">0 Child</option>
                                                    <option value="1">1 Child</option>
                                                    <option value="2">2 Children</option>
                                                    <option value="3">3 Children</option>
                                                </select>
                                            </div>
                                        </div>
                                    </div>
                                    <div style={{ borderTop: '1px solid rgba(201,169,89,0.3)', paddingTop: '1.5rem' }}>
                                        <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: '0.8rem' }}>
                                            <span style={{ opacity: 0.8 }}>Guests</span>
                                            <span style={{ fontWeight: '700' }}>{searchParams.adults} Adults, {searchParams.children} Children</span>
                                        </div>
                                        <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: '0.8rem' }}>
                                            <span style={{ opacity: 0.8 }}>Room Size</span>
                                            <span style={{ fontWeight: '700' }}>{selectedRoom.size} sq.ft</span>
                                        </div>
                                        <div style={{ display: 'flex', justifyContent: 'space-between' }}>
                                            <span style={{ opacity: 0.8 }}>Bed Type</span>
                                            <span style={{ fontWeight: '700' }}>{selectedRoom.bed}</span>
                                        </div>
                                    </div>
                                    <div style={{ marginTop: '1.5rem', padding: '1rem', background: 'rgba(255,255,255,0.1)', borderRadius: '12px' }}>
                                        <div style={{ display: 'flex', alignItems: 'center', gap: '0.5rem', marginBottom: '0.5rem' }}>
                                            <i className="fas fa-check-circle" style={{ color: 'var(--secondary)' }}></i>
                                            <span style={{ fontSize: '0.85rem' }}>Free Cancellation up to 24h before</span>
                                        </div>
                                        <div style={{ display: 'flex', alignItems: 'center', gap: '0.5rem' }}>
                                            <i className="fas fa-check-circle" style={{ color: 'var(--secondary)' }}></i>
                                            <span style={{ fontSize: '0.85rem' }}>Book with ₹0 upfront</span>
                                        </div>
                                        {selectedNearbyServices.length > 0 && (
                                            <>
                                                <div style={{ display: 'flex', alignItems: 'center', gap: '0.5rem', marginTop: '0.5rem' }}>
                                                    <i className="fas fa-concierge-bell" style={{ color: 'var(--secondary)' }}></i>
                                                    <span style={{ fontSize: '0.85rem' }}>
                                                        {selectedNearbyServices.length} service type(s), {totalSelectedServiceUnits} unit(s) · +₹{selectedServicesTotal.toLocaleString()}
                                                    </span>
                                    </div>
                                                <div style={{ marginTop: '0.5rem', fontSize: '0.78rem', opacity: 0.9 }}>
                                                    {selectedNearbyServices.slice(0, 2).map((service) => (
                                                        <div key={service}>
                                                            {service} x{selectedServiceQuantities[service] || 0} · {(serviceSchedules[service]?.date || searchParams.checkIn || today)} {(serviceSchedules[service]?.time || getDefaultServiceTime(service))}
                                </div>
                                                    ))}
                                                    {selectedNearbyServices.length > 2 && <div>+ {selectedNearbyServices.length - 2} more services</div>}
                                                </div>
                                            </>
                                        )}
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                                </p>
                                <div className="social-links">
                                    <a href="#" className="social-link"><i className="fab fa-instagram"></i></a>
                                    <a href="#" className="social-link"><i className="fab fa-facebook-f"></i></a>
                                    <a href="#" className="social-link"><i className="fab fa-twitter"></i></a>
                                    <a href="#" className="social-link"><i className="fas fa-hotel"></i></a>
                                    <a href="#" className="social-link"><i className="fab fa-youtube"></i></a>

                                    <li><a href="#">Experiences</a></li>
                                    <li><a href="#">Weddings & Events</a></li>
                                    <li><a href="#">Special Offers</a></li>

                                    <li><a href="#">Privacy Policy</a></li>

                                    <li><a href="#">FAQs</a></li>

                                </ul>
                            </div>
                            <div>
                                <h3 className="footer-title">CONTACT</h3>
                                <ul className="footer-links">
                                    <li><i className="fas fa-map-marker-alt" style={{ color: 'var(--secondary)', marginRight: '0.5rem' }}></i> Pine Valley, Himalayas, India</li>
                                    <li><i className="fas fa-phone" style={{ color: 'var(--secondary)', marginRight: '0.5rem' }}></i> +91 98765 43210</li>
                                    <li><i className="fas fa-envelope" style={{ color: 'var(--secondary)', marginRight: '0.5rem' }}></i> reservations@heavenhills.com</li>
                                    <li><i className="fas fa-clock" style={{ color: 'var(--secondary)', marginRight: '0.5rem' }}></i> 24/7 Concierge</li>
                                </ul>
                            </div>
                        </div>
                        <div style={{ textAlign: 'center', paddingTop: '3rem', marginTop: '3rem', borderTop: '1px solid rgba(255,255,255,0.1)' }}>
                            <p style={{ opacity: 0.7, letterSpacing: '2px', fontSize: '0.8rem' }}>
                                © 2026 HEAVEN HILLS · THE HIMALAYAN LUXURY COLLECTION · ALL RIGHTS RESERVED
                            </p>
                        </div>
                    </footer>

                    <AuthModal
                        isOpen={isAuthModalOpen}
                        onClose={() => setIsAuthModalOpen(false)}
                        mode={authModalMode}
                        onModeChange={setAuthModalMode}
                        onLogin={login}
                        onRegister={register}
                    />

                    <div className={`notification ${notification.show ? 'show' : ''}`}>
                        <i className="fas fa-check-circle"></i>
                        {notification.message}
                    </div>
                    <div className={`theme-transition ${isThemeTransitioning ? 'play' : ''}`}></div>
                    <div className="ai-assistant">
                        <div className="assistant-header" onClick={() => setAssistantOpen(prev => !prev)}>
                            <strong><i className="fas fa-robot"></i> Booking Assistant</strong>
                            <i className={`fas ${assistantOpen ? 'fa-chevron-down' : 'fa-chevron-up'}`}></i>
                        </div>
                        {assistantOpen && (
                            <div className="assistant-body">
                                <span className="assistant-mini">Try quick actions:</span>
                                <button className="assistant-chip" onClick={() => { applyQuickPreset('weekend'); setCurrentPage('rooms'); }}>
                                    Find best rooms for this weekend
                                </button>
                                <button className="assistant-chip" onClick={() => { setSortBy('price-low'); setCurrentPage('rooms'); showNotification('Sorted by lowest price.'); }}>
                                    Show me most affordable options
                                </button>
                                <button className="assistant-chip" onClick={() => { setSortBy('rating-high'); setCurrentPage('rooms'); showNotification('Showing highest rated rooms.'); }}>
                                    Show top-rated premium stays
                                </button>
                                <div className="assistant-chat-log">
                                    {assistantMessages.slice(-6).map((msg, idx) => (
                                        <div key={idx} className={`assistant-msg ${msg.role}`}>
                                            {msg.text}
                                        </div>
                                    ))}
                                </div>
                                <div className="assistant-input-row">
                                    <input
                                        className="assistant-input"
                                        type="text"
                                        value={assistantInput}
                                        onChange={(e) => setAssistantInput(e.target.value)}
                                        onKeyDown={(e) => { if (e.key === 'Enter') runAssistantQuery(); }}
                                        placeholder="Ask: cheap rooms, family stay..."
                                    />
                                    <button className="assistant-send" onClick={runAssistantQuery} title="Send">
                                        <i className="fas fa-paper-plane"></i>
                                    </button>
                                </div>
                                <div className="assistant-suggestions">
                                    <button className="assistant-suggestion" onClick={() => runAssistantQuery('Show cheap rooms')}>
                                        Cheap rooms
                                    </button>
                                    <button className="assistant-suggestion" onClick={() => runAssistantQuery('I want family stay')}>
                                        Family stay
                                    </button>
                                    <button className="assistant-suggestion" onClick={() => runAssistantQuery('Show luxury options')}>
                                        Luxury options
                                    </button>
                                    <button className="assistant-suggestion" onClick={() => runAssistantQuery('What is cancellation policy?')}>
                                        Cancellation policy
                                    </button>
                                    <button className="assistant-suggestion" onClick={() => runAssistantQuery('Need support number')}>
                                        Contact support
                                    </button>
                                </div>
                            </div>
                        )}
                    </div>
                    <div className="floating-dock">
                        <button
                            className="dock-btn"
                            onClick={() => setCurrentPage('rooms')}
                            title="Browse rooms"
                        >
                            <i className="fas fa-bed"></i>
                        </button>
                        <button
                            className="dock-btn"
                            onClick={() => showNotification('Need help? Call concierge: +91 98765 43210')}
                            title="Quick support"
                        >
                            <i className="fas fa-headset"></i>
                        </button>
                        <button
                            className={`dock-btn ${showScrollTop ? '' : 'hidden'}`}
                            onClick={() => window.scrollTo({ top: 0, behavior: 'smooth' })}
                            title="Back to top"
                        >
                            <i className="fas fa-arrow-up"></i>
                        </button>
                    </div>
                </>
            );
        };

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
