<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>HEAVEN HILLS · 5-Star Himalayan Luxury Resort · ROYAL ADMIN</title>
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* ===== GLOBAL DESIGN SYSTEM ===== (unchanged, only additions) */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #0a2e3f;
            --primary-light: #1a4a5f;
            --primary-dark: #051f2a;
            --secondary: #c9a959;
            --secondary-light: #e6d5a8;
            --secondary-dark: #b38f4a;
            --accent: #8a6e4b;
            --light: #faf7f2;
            --light-gray: #f1f5f9;
            --dark: #1e2e3b;
            --success: #2e7d5e;
            --danger: #b4433c;
            --warning: #e6b422;
            --info: #3a7ca5;
            --gray: #8a9a9b;
            --gray-light: #e9ecef;
            --shadow-sm: 0 5px 20px rgba(0,0,0,0.05);
            --shadow-md: 0 15px 35px rgba(0,0,0,0.1);
            --shadow-lg: 0 25px 50px rgba(0,0,0,0.15);
            --border-radius-sm: 8px;
            --border-radius-md: 16px;
            --border-radius-lg: 24px;
            --border-radius-xl: 32px;
            --transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            
            /* Royal admin theme additions */
            --royal-gold: #d4af37;
            --royal-gold-light: #f1e5c9;
            --royal-burgundy: #5e2e4a;
            --royal-navy: #0a2e3f;
            --royal-cream: #fffaf0;
            --royal-pattern: rgba(201,169,89,0.03);
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: var(--light);
            color: var(--dark);
            line-height: 1.7;
            overflow-x: hidden;
        }

        h1, h2, h3, h4, h5, h6 {
            font-family: 'Cormorant Garamond', serif;
            font-weight: 700;
            letter-spacing: 1px;
        }

        /* ===== CUSTOM SCROLLBAR ===== */
        ::-webkit-scrollbar { width: 12px; height: 12px; }
        ::-webkit-scrollbar-track { background: var(--light-gray); border-radius: 6px; }
        ::-webkit-scrollbar-thumb { background: var(--secondary); border-radius: 6px; border: 3px solid var(--light-gray); }
        ::-webkit-scrollbar-thumb:hover { background: var(--secondary-dark); }

        html { scroll-behavior: smooth; }

        /* ===== NAVIGATION ===== (unchanged) */
        .navbar {
            position: fixed;
            top: 25px;
            left: 50%;
            transform: translateX(-50%);
            width: 95%;
            max-width: 1600px;
            background: rgba(10, 46, 63, 0.95);
            backdrop-filter: blur(12px);
            padding: 1rem 2.5rem;
            border-radius: 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            border: 1px solid rgba(201,169,89,0.3);
            box-shadow: var(--shadow-lg);
            transition: var(--transition);
        }

        .navbar.scrolled { top: 15px; background: var(--primary); padding: 0.8rem 2.5rem; }

        .logo {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #c9a959, #e6d5a8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 6px;
            position: relative;
        }

        .logo::after {
            content: '✦';
            position: absolute;
            right: -25px;
            top: 5px;
            color: var(--secondary);
            font-size: 1.5rem;
            -webkit-text-fill-color: var(--secondary);
        }

        .nav-links {
            display: flex;
            gap: 3rem;
            list-style: none;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            transition: color 0.3s ease;
            position: relative;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--secondary);
            transition: width 0.3s ease;
        }

        .nav-links a:hover::after,
        .nav-links a.active::after { width: 100%; }
        .nav-links a:hover,
        .nav-links a.active { color: var(--secondary); }

        .nav-buttons { display: flex; gap: 1rem; }

        /* ===== BUTTONS ===== (unchanged) */
        .btn {
            padding: 0.8rem 2rem;
            border: none;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            cursor: pointer;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 0.8rem;
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .btn:hover::before { width: 300px; height: 300px; }

        .btn-primary {
            background: var(--secondary);
            color: var(--primary);
            border: 2px solid var(--secondary);
        }

        .btn-primary:hover {
            background: transparent;
            color: var(--secondary);
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(201,169,89,0.3);
        }

        .btn-outline {
            background: transparent;
            color: white;
            border: 2px solid var(--secondary);
        }

        .btn-outline:hover {
            background: var(--secondary);
            color: var(--primary);
            transform: translateY(-3px);
        }

        /* ===== HERO SECTION ===== (unchanged) */
        .hero {
            height: 100vh;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: white;
            overflow: hidden;
        }

        .hero-slider {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .hero-slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            opacity: 0;
            transition: opacity 1.8s ease;
        }

        .hero-slide.active { opacity: 1; }
        .hero-slide::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, rgba(10,46,63,0.3), rgba(10,46,63,0.8));
        }

        .hero-content {
            position: relative;
            z-index: 10;
            max-width: 1200px;
            padding: 0 2rem;
            animation: fadeInUp 1.5s ease;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .hero-title {
            font-size: 6rem;
            font-weight: 700;
            color: white;
            margin-bottom: 1rem;
            text-shadow: 0 15px 35px rgba(0,0,0,0.3);
            letter-spacing: 12px;
        }

        .hero-title span { 
            color: var(--secondary);
            text-shadow: 0 0 20px rgba(201,169,89,0.5);
        }

        .hero-subtitle {
            font-size: 1.3rem;
            letter-spacing: 8px;
            margin-bottom: 3rem;
            color: rgba(255,255,255,0.95);
            font-weight: 300;
        }

        /* ===== SEARCH PANEL ===== (unchanged) */
        .search-panel {
            margin-top: 3.5rem;
            padding: 1.5rem;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(201,169,89,0.4);
            border-radius: 70px;
            display: grid;
            grid-template-columns: 1.5fr repeat(4, 1fr) 0.8fr;
            gap: 0.8rem;
            align-items: center;
        }

        .search-field {
            display: flex;
            flex-direction: column;
            text-align: left;
            padding: 0.3rem 1.2rem;
            border-radius: 50px;
            transition: background 0.3s ease;
        }

        .search-field:hover { background: rgba(255,255,255,0.05); }

        .search-label {
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--secondary);
            margin-bottom: 0.2rem;
            font-weight: 600;
        }

        .search-input {
            background: transparent;
            border: none;
            color: white;
            font-size: 0.95rem;
            padding: 0.3rem 0;
            font-family: 'Montserrat', sans-serif;
        }

        .search-input:focus { outline: none; }
        .search-input::placeholder { color: rgba(255,255,255,0.6); }
        .search-input option { background: var(--primary); color: white; }

        /* ===== SECTION STYLES ===== */
        .section {
            padding: 6rem 5rem;
            max-width: 1800px;
            margin: 0 auto;
        }

        .section-header {
            text-align: center;
            margin-bottom: 4rem;
        }

        .section-tag {
            display: inline-block;
            padding: 0.4rem 1.8rem;
            background: rgba(201,169,89,0.1);
            color: var(--secondary);
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 1rem;
            border: 1px solid rgba(201,169,89,0.3);
        }

        .section-title {
            font-size: 3.5rem;
            color: var(--primary);
            margin-bottom: 1rem;
            position: relative;
            display: inline-block;
        }

        .section-title::after {
            content: '';
            position: absolute;
            bottom: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 3px;
            background: linear-gradient(90deg, var(--secondary), #e6d5a8);
            border-radius: 3px;
        }

        /* ===== ROOM CARDS - MAKEMYTRIP STYLE ===== */
        .rooms-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(450px, 1fr));
            gap: 2.5rem;
            margin-top: 3rem;
        }

        .room-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: var(--shadow-md);
            transition: var(--transition);
            border: 1px solid rgba(201,169,89,0.1);
            display: flex;
            flex-direction: column;
        }

        .room-card:hover {
            transform: translateY(-8px);
            box-shadow: var(--shadow-lg);
            border-color: var(--secondary);
        }

        .room-image-wrapper {
            position: relative;
            height: 280px;
            overflow: hidden;
        }

        .room-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.8s ease;
        }

        .room-card:hover .room-image {
            transform: scale(1.08);
        }

        .room-badge {
            position: absolute;
            top: 20px;
            left: 20px;
            background: var(--secondary);
            color: var(--primary);
            padding: 0.5rem 1.2rem;
            border-radius: 30px;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 1px;
            z-index: 5;
            box-shadow: 0 5px 15px rgba(201,169,89,0.3);
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }

        .room-gallery {
            position: absolute;
            bottom: 20px;
            right: 20px;
            display: flex;
            gap: 0.5rem;
            z-index: 5;
        }

        .gallery-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: rgba(255,255,255,0.5);
            cursor: pointer;
            transition: var(--transition);
        }

        .gallery-dot.active {
            background: var(--secondary);
            transform: scale(1.2);
        }

        .room-content {
            padding: 1.8rem;
            flex: 1;
        }

        .room-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 0.8rem;
        }

        .room-name {
            font-size: 1.6rem;
            color: var(--primary);
            margin-bottom: 0.2rem;
        }

        .room-location {
            display: flex;
            align-items: center;
            gap: 0.3rem;
            color: var(--gray);
            font-size: 0.85rem;
            margin-bottom: 0.5rem;
        }

        .room-location i {
            color: var(--secondary);
            font-size: 0.75rem;
        }

        .room-rating {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: rgba(201,169,89,0.1);
            padding: 0.3rem 1rem;
            border-radius: 30px;
        }

        .rating-score {
            background: var(--secondary);
            color: var(--primary);
            font-weight: 700;
            padding: 0.2rem 0.5rem;
            border-radius: 20px;
            font-size: 0.8rem;
        }

        .room-amenities {
            display: flex;
            flex-wrap: wrap;
            gap: 0.6rem;
            margin: 1rem 0;
        }

        .amenity-tag {
            padding: 0.3rem 1rem;
            background: var(--light);
            border-radius: 30px;
            font-size: 0.75rem;
            color: var(--dark);
            border: 1px solid rgba(201,169,89,0.2);
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }

        .room-price-section {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-top: 1.2rem;
            padding-top: 1.2rem;
            border-top: 1px solid #edf2f7;
        }

        .room-price {
            display: flex;
            flex-direction: column;
        }

        .price-label {
            font-size: 0.75rem;
            color: var(--gray);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .price-amount {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--secondary);
            line-height: 1;
        }

        .price-amount span {
            font-size: 0.9rem;
            font-weight: 400;
            color: var(--gray);
            margin-left: 0.3rem;
        }

        .original-price {
            font-size: 0.9rem;
            color: var(--gray);
            text-decoration: line-through;
            margin-left: 0.5rem;
        }

        .tax-info {
            font-size: 0.7rem;
            color: var(--gray);
            margin-top: 0.2rem;
        }

        .free-cancellation {
            color: var(--success);
            font-size: 0.75rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.3rem;
            margin-top: 0.3rem;
        }

        /* ===== REVIEWS SECTION ===== (unchanged) */
        .reviews-section {
            background: white;
            border-radius: 20px;
            padding: 2.5rem;
            margin-top: 3rem;
        }

        .review-card {
            padding: 1.5rem;
            border-bottom: 1px solid #edf2f7;
        }

        .review-card:last-child {
            border-bottom: none;
        }

        .review-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.8rem;
        }

        .reviewer-name {
            font-weight: 700;
            color: var(--primary);
        }

        .review-stars {
            color: #ffb800;
            letter-spacing: 2px;
        }

        .review-text {
            color: var(--dark);
            font-size: 0.95rem;
            line-height: 1.6;
        }

        .review-property {
            color: var(--secondary);
            font-size: 0.8rem;
            font-weight: 600;
            margin-top: 0.5rem;
        }

        /* ===== EXPERIENCES SECTION ===== (unchanged) */
        .experiences-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            margin-top: 2rem;
        }

        .experience-card {
            background: white;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: var(--shadow-sm);
            transition: var(--transition);
            border: 1px solid rgba(201,169,89,0.1);
        }

        .experience-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-md);
            border-color: var(--secondary);
        }

        .experience-icon {
            font-size: 2.5rem;
            color: var(--secondary);
            margin-bottom: 1rem;
        }

        .experience-title {
            font-size: 1.3rem;
            color: var(--primary);
            margin-bottom: 0.5rem;
        }

        .experience-description {
            color: var(--gray);
            font-size: 0.9rem;
            margin-bottom: 1rem;
        }

        .experience-price {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--secondary);
        }

        .experience-price span {
            font-size: 0.8rem;
            font-weight: 400;
            color: var(--gray);
        }

        /* ===== FILTER BAR ===== */
        .filter-bar {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            background: white;
            padding: 1.5rem 2rem;
            border-radius: 60px;
            margin-bottom: 2rem;
            box-shadow: var(--shadow-sm);
        }
        .filter-group {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            flex-wrap: wrap;
        }
        .filter-select {
            padding: 0.6rem 1.2rem;
            border-radius: 40px;
            border: 1px solid #e2e8f0;
            background: white;
            font-size: 0.85rem;
            color: var(--dark);
        }

        /* ===== GUEST DASHBOARD ===== */
        .guest-dashboard {
            padding: 2rem;
            background: white;
            border-radius: 24px;
            margin-bottom: 2rem;
        }
        .booking-history-card {
            background: var(--light);
            padding: 1.5rem;
            border-radius: 16px;
            margin-bottom: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }

        /* ===== ADMIN CHART ===== */
        .chart-container {
            display: flex;
            align-items: flex-end;
            gap: 1.5rem;
            margin-top: 1.5rem;
            height: 200px;
        }
        .chart-bar {
            width: 60px;
            background: linear-gradient(to top, var(--secondary), #e6d5a8);
            border-radius: 12px 12px 0 0;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            text-align: center;
            color: var(--primary);
            font-weight: 700;
            padding-top: 0.5rem;
            box-shadow: 0 -2px 10px rgba(201,169,89,0.2);
            transition: height 0.3s ease;
        }

        /* ===== AUTH MODAL ===== (unchanged) */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10,46,63,0.98);
            backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            opacity: 0;
            visibility: hidden;
            transition: var(--transition);
        }

        .modal.active {
            opacity: 1;
            visibility: visible;
        }

        .modal-content {
            background: white;
            padding: 3.5rem;
            border-radius: 40px;
            max-width: 520px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
            transform: scale(0.9) translateY(20px);
            transition: var(--transition);
            border: 2px solid var(--secondary);
        }

        .modal.active .modal-content {
            transform: scale(1) translateY(0);
        }

        .modal-close {
            position: absolute;
            top: 1.5rem;
            right: 1.5rem;
            background: none;
            border: none;
            font-size: 2rem;
            cursor: pointer;
            color: var(--gray);
            transition: var(--transition);
        }

        .modal-close:hover {
            color: var(--danger);
            transform: rotate(90deg);
        }

        .modal-tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            padding: 0.5rem;
            background: #f1f5f9;
            border-radius: 60px;
        }

        .modal-tab {
            flex: 1;
            padding: 0.8rem;
            border: none;
            border-radius: 60px;
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            transition: var(--transition);
            background: transparent;
            color: var(--primary);
        }

        .modal-tab.active {
            background: var(--secondary);
            color: var(--primary);
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--secondary);
            margin-bottom: 0.5rem;
        }

        .form-control {
            width: 100%;
            padding: 0.9rem 1.2rem;
            border: 2px solid #e2e8f0;
            border-radius: 16px;
            font-family: 'Montserrat', sans-serif;
            transition: var(--transition);
        }

        .form-control:focus {
            outline: none;
            border-color: var(--secondary);
            box-shadow: 0 0 0 4px rgba(201,169,89,0.1);
        }

        /* ===== FOOTER ===== (unchanged) */
        .footer {
            background: var(--primary);
            color: white;
            padding: 5rem 5rem 2rem;
            margin-top: 5rem;
            position: relative;
        }

        .footer::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, var(--secondary), transparent);
        }

        .footer-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 3rem;
            max-width: 1600px;
            margin: 0 auto;
        }

        .footer-title {
            color: var(--secondary);
            font-size: 1.3rem;
            margin-bottom: 1.5rem;
            position: relative;
            display: inline-block;
        }

        .footer-title::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 0;
            width: 40px;
            height: 2px;
            background: var(--secondary);
        }

        .footer-links {
            list-style: none;
        }

                if (user) {
                    const userData = {
                        id: user.id,
                        name: user.name,
                        email: user.email,
                        role: user.role,
                        avatar: user.avatar
                    };
                    localStorage.setItem('hh_current_user', JSON.stringify(userData));
                    setUser(userData);
                    return { success: true, user: userData };
                }

                const guests = Storage.getGuests();
                const guest = guests.find(g => g.email === email && g.password === password);
                
                if (guest) {
                    const userData = {
                        id: guest.id,
                        name: guest.name,
                        email: guest.email,
                        role: 'guest',
                        avatar: guest.avatar || 'https://randomuser.me/api/portraits/lego/1.jpg'
                    };
                    localStorage.setItem('hh_current_user', JSON.stringify(userData));
                    setUser(userData);
                    return { success: true, user: userData };
                }

                return { success: false, error: 'Invalid email or password' };
            }, []);

            const register = useCallback(async (userData) => {
                await new Promise(resolve => setTimeout(resolve, 600));

                if (!userData.name || !userData.email || !userData.phone || !userData.password) {
                    return { success: false, error: 'All fields are required' };
                }

                if (userData.password.length < 6) {
                    return { success: false, error: 'Password must be at least 6 characters' };
                }

                const users = Storage.getUsers();
                const guests = Storage.getGuests();
                
                if (users.find(u => u.email === userData.email) || guests.find(g => g.email === userData.email)) {
                    return { success: false, error: 'Email already registered' };
                }

                const newGuest = {
                    name: userData.name,
                    email: userData.email,
                    phone: userData.phone,
                    password: userData.password,
                    avatar: `https://randomuser.me/api/portraits/${Math.random() > 0.5 ? 'men' : 'women'}/${Math.floor(Math.random() * 50 + 1)}.jpg`,
                    bookings: 0,
                    totalSpent: 0
                };

                const savedGuest = Storage.addGuest(newGuest);
                
                const userDataResponse = {
                    id: savedGuest.id,
                    name: savedGuest.name,
                    email: savedGuest.email,
                    role: 'guest',
                    avatar: savedGuest.avatar
                };

                localStorage.setItem('hh_current_user', JSON.stringify(userDataResponse));
                setUser(userDataResponse);
                return { success: true, user: userDataResponse };
            }, []);

            const logout = useCallback(() => {
                localStorage.removeItem('hh_current_user');
                setUser(null);
            }, []);

            return { user, loading, login, register, logout };

                checkIn: today, 
                checkOut: tomorrow, 
                adults: 2, 
                children: 0,
                destination: 'Himalayas, India'
            });
            const [heroSlide, setHeroSlide] = useState(0);
            const [notification, setNotification] = useState({ show: false, message: '' });
            const [roomImages, setRoomImages] = useState({});
            const [dateError, setDateError] = useState('');

            const [priceRange, setPriceRange] = useState([0, 30000]);
            const [capacityFilter, setCapacityFilter] = useState('all');
            const [filteredRooms, setFilteredRooms] = useState([]);

            const auth = useAuth();
            const { user, login, register, logout, loading } = auth;

            const [isAuthModalOpen, setIsAuthModalOpen] = useState(false);
            const [authModalMode, setAuthModalMode] = useState('login');

            const heroImages = [
                'https://images.unsplash.com/photo-1542314831-068cd1dbfeeb?w=1600',
                'https://images.unsplash.com/photo-1566073771259-6a8506099945?w=1600',
                'https://images.unsplash.com/photo-1582719508461-905c673771fd?w=1600',
                'https://images.unsplash.com/photo-1618773928121-c32242e63f39?w=1600'
            ];

            useEffect(() => {
                const interval = setInterval(() => {
                    setHeroSlide(prev => (prev + 1) % heroImages.length);
                }, 6000);
                return () => clearInterval(interval);
            }, []);

            useEffect(() => {
                const handleScroll = () => {
                    const navbar = document.querySelector('.navbar');
                    if (navbar) {
                        if (window.scrollY > 50) {
                            navbar.classList.add('scrolled');
                        } else {
                            navbar.classList.remove('scrolled');
                        }
                    }
                };
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            useEffect(() => {
                if (searchParams.checkIn && searchParams.checkOut) {
                    if (new Date(searchParams.checkOut) <= new Date(searchParams.checkIn)) {
                        setDateError('Check-out date must be after check-in date');
                    } else {
                        setDateError('');
                    }
                } else {
                    setDateError('Please select both dates');
                }
            }, [searchParams.checkIn, searchParams.checkOut]);

            useEffect(() => {
                const rooms = Storage.getRooms();
                let filtered = rooms.filter(room => 
                    room.discount >= priceRange[0] && room.discount <= priceRange[1]
                );
                if (capacityFilter !== 'all') {
                    filtered = filtered.filter(room => room.capacity >= parseInt(capacityFilter));
                }
                setFilteredRooms(filtered);
            }, [priceRange, capacityFilter]);

                setNotification({ show: true, message });

                const diff = new Date(searchParams.checkOut) - new Date(searchParams.checkIn);
                return Math.ceil(diff / (1000 * 60 * 60 * 24));

                return price * nights * 1.18;

                    guestEmail: user.email,
                    guestPhone: user.phone || 'Not provided',
